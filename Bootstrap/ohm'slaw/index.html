<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Example of Bootstrap 4 Inline Form Layout</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
<link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">

</head>
<body>
    <div id="heading1" class="jumbotron">
        <h1 class="text-center">
            Ohm's Law
        </h1>
    </div>
    
    <div id="vform" class="container">
        <form class="form-inline">
            <div class="row">
                <div class="col-4">
                    <input type="number" id="ct_ampere"
                    class="form-control"
                    placeholder="Current in Ampere"
                    required>
                </div>
                <div class="col-4">
                    <input type="number" id="res_ohm"
                    class="form-control"
                    placeholder="Resistance in Ohm"
                    required>
                </div>
                <div class="col-4">
                    <button type="button" class="btn btn-primary" id="volt">
                        Voltage in Volt<i class="fa fa-bolt" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </form>
    </div>
